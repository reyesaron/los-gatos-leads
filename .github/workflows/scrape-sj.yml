name: Scrape SJ + PA + Cupertino Permits

on:
  schedule:
    - cron: "0 23 * * 1" # Every Monday at 4pm PT (23:00 UTC)
    - cron: "0 17 * * 4" # Every Thursday at 10am PT (17:00 UTC)
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SCRAPER_LOG_TOKEN: ${{ secrets.SCRAPER_LOG_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Scrape San Jose permits (Open Data Portal)
        id: sj
        run: node src/scripts/scrape-sj-opendata.mjs && echo "sj_status=success" >> $GITHUB_OUTPUT || echo "sj_status=failure" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Merge San Jose permits
        if: steps.sj.outputs.sj_status == 'success'
        run: node src/scripts/merge-sj-permits.mjs
        continue-on-error: true

      - name: Scrape Palo Alto permits (Open Data Portal)
        id: pa
        run: node src/scripts/scrape-pa-opendata.mjs && echo "pa_status=success" >> $GITHUB_OUTPUT || echo "pa_status=failure" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Scrape Cupertino permits (Accela)
        id: cup
        run: node src/scripts/scrape-cupertino.mjs && echo "cup_status=success" >> $GITHUB_OUTPUT || echo "cup_status=failure" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Scrape Los Altos projects (eTRAKiT)
        id: la
        run: node src/scripts/scrape-losaltos.mjs && echo "la_status=success" >> $GITHUB_OUTPUT || echo "la_status=failure" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Log scraper results
        if: always()
        run: |
          node scripts/log-scrape.mjs san-jose ${{ steps.sj.outputs.sj_status || 'failure' }}
          node scripts/log-scrape.mjs palo-alto ${{ steps.pa.outputs.pa_status || 'failure' }}
          node scripts/log-scrape.mjs cupertino ${{ steps.cup.outputs.cup_status || 'failure' }}
          node scripts/log-scrape.mjs los-altos ${{ steps.la.outputs.la_status || 'failure' }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/sanjose-scraped.json src/data/sanjose-merged.json src/data/paloalto-scraped.json src/data/cupertino-scraped.json src/data/losaltos-scraped.json
          if git diff --cached --quiet; then
            echo "No changes to permit data"
          else
            git commit -m "chore: update permit data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
