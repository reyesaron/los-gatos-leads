name: Scrape SJ + PA Permits

on:
  schedule:
    - cron: "0 23 * * 1" # Every Monday at 4pm PT (23:00 UTC)
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Scrape San Jose permits (Open Data Portal)
        run: node src/scripts/scrape-sj-opendata.mjs

      - name: Merge San Jose permits
        run: node src/scripts/merge-sj-permits.mjs

      - name: Scrape Palo Alto permits (Open Data Portal)
        run: node src/scripts/scrape-pa-opendata.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/sanjose-scraped.json src/data/sanjose-merged.json src/data/paloalto-scraped.json
          if git diff --cached --quiet; then
            echo "No changes to permit data"
          else
            git commit -m "chore: update SJ + PA permit data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
